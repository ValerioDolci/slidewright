<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <title>Slidewright — self test</title>
  <style>
    body { font-family: ui-monospace, Menlo, monospace; background: #14130f; color: #efe9dd; margin: 0; padding: 16px; }
    #result { white-space: pre-wrap; font-size: 13px; line-height: 1.55; }
    .ok { color: #6fd18a; } .bad { color: #ff8a7a; }
    h1 { font-size: 15px; color: #e2861f; }
  </style>
</head>
<body>
  <h1>Slidewright — self test (regressione moduli core)</h1>
  <div id="result">running…</div>

  <script type="module">
    import { parseDeck } from '/src/core/import.js';
    import { buildDeckHtml, cleanSlideHtml } from '/src/core/export-html.js';
    import { buildPrintHtml, buildRasterPrintHtml, rasterizeDeck } from '/src/core/export-pdf.js';
    import { externalize, inline, describeAssetsForLlm, collectAssetIds, pruneAssets } from '/src/core/assets.js';
    import { createDeck, cloneDeck, welcomeDeck } from '/src/core/model.js';
    import { rgbaParts, hexToRgba, Inspector } from '/src/ui/inspector.js';
    import { Stage } from '/src/ui/stage.js';
    import { EDITOR_ATTR } from '/src/util/id.js';
    import { ICONS, iconSvg } from '/src/core/icons.js';
    import { snapshotAppearance, readAppearance } from '/src/core/appearance.js';

    const log = []; let pass = 0, fail = 0;
    const A = (cond, msg) => {
      if (cond) { pass++; log.push(`<span class="ok">PASS</span> ${msg}`); }
      else { fail++; log.push(`<span class="bad">FAIL</span> ${msg}`); }
    };

    const PNG = 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==';
    const SAMPLE = `<!DOCTYPE html><html lang="it"><head><title>Mini</title>
<style>@import url(https://fonts.googleapis.com/css?family=Inter);
:root{--a:#b45309}.slide{position:absolute;inset:0}.card{background:rgba(255,255,255,.08);border-radius:16px}</style></head>
<body><div class="deck">
<section class="slide active"><h1>Uno</h1><div class="card">c</div><img src="${PNG}" onerror="window.__IMGHACK=1"></section>
<section class="slide"><h2>Due</h2><scr` + `ipt>window.__HACK=1</scr` + `ipt></section>
</div></body></html>`;

    try {
      // ---- import ----
      const deck = parseDeck(SAMPLE);
      A(deck.slides.length === 2, `import: 2 slide (${deck.slides.length})`);
      A(deck.meta.title === 'Mini', `import: title "${deck.meta.title}"`);
      A(deck.canvas.w === 1280 && deck.canvas.h === 720, 'import: canvas 1280x720');

      // ---- google fonts strip ----
      A(!/googleapis/.test(deck.styleCss), 'fonts: @import googleapis rimosso');
      A(deck.styleCss.includes('--a:#b45309'), 'fonts: resto del CSS preservato');
      A(deck._warnings.some((w) => /font/i.test(w)), 'fonts: warning emesso');

      // ---- script strip ----
      A(!/<script/i.test(deck.slides[1].html) && !window.__HACK, 'sicurezza: <script> rimosso, non eseguito');

      // ---- [F3] avvisi di fedeltà: script rimossi + risorse esterne ----
      A(deck._warnings.some((w) => /[Ss]cript rimossi/.test(w)), 'F3: avviso "script rimossi" (il SAMPLE ha uno <script>)');
      const extDeck = parseDeck('<html><head><style>.x{background:url(https://cdn.example.com/bg.png)}</style></head><body><div class="deck"><section class="slide"><img src="https://cdn.example.com/a.png"></section></div></body></html>');
      A(extDeck._warnings.some((w) => /[Rr]isorse esterne/.test(w)), 'F3: avviso "risorse esterne" su img/url http');
      const cleanDeck = parseDeck('<html><body><div class="deck"><section class="slide"><h1>ok</h1></section></div></body></html>');
      A(!cleanDeck._warnings.some((w) => /esterne|rimossi/.test(w)), 'F3: nessun avviso spurio su deck pulito');

      // ---- <style> dentro una slide NON deve diventare globale (non spagina le altre) ----
      const leaky = parseDeck('<html><head><style>.card{color:#fff}</style></head><body><div class="deck">' +
        '<section class="slide"><div class="card">A</div></section>' +
        '<section class="slide"><style>section{width:1920px} .card{display:none}</style><div class="card">B</div></section>' +
        '<section class="slide"><div class="card">C</div></section></div></body></html>');
      A(leaky.slides.length === 3, 'slide-style: 3 slide');
      A(!/1920px/.test(leaky.styleCss) && !/display:\s*none/.test(leaky.styleCss), 'slide-style: lo <style> della slide NON entra nel CSS globale');
      A(/color:#fff/.test(leaky.styleCss), 'slide-style: lo <style> globale (head) resta globale');
      A(/<style/i.test(leaky.slides[1].html) && /1920px/.test(leaky.slides[1].html), 'slide-style: lo <style> resta nella sua slide (isolato)');

      // ---- PDF: ogni pagina ha .active (deck con .slide{display:none}/.active non esce vuoto) ----
      const dnDeck = parseDeck('<html><head><style>.slide{display:none}.slide.active{display:flex}</style></head><body><div class="deck">' +
        '<section class="slide"><h1>A</h1></section><section class="slide"><h1>B</h1></section></div></body></html>');
      const printHtml = buildPrintHtml(dnDeck);
      // [iframe-per-page] ogni slide = un iframe-pagina (srcdoc) con la slide attiva dentro →
      // i deck display:none/.active non escono vuoti (ogni iframe rende UNA slide, attiva).
      A((printHtml.match(/class="ss-print-fr"/g) || []).length === 2 && printHtml.includes('slide active'),
        'pdf: un iframe-pagina per slide, ciascuna con la slide attiva (no pagine vuote)');

      // ---- [ARCH] tela fissa: niente adattamento del contenuto in export (no fitScale) ----
      // Anche se una slide porta un (vecchio) fitScale nel modello, l'export NON applica
      // più transform: la tela è fissa 1280×720, scalata solo esternamente (shell/pagina).
      const fdeck = { meta: { title: 'T', lang: 'it' }, mode: 'deck', canvas: { w: 1280, h: 720 }, styleCss: '', slides: [{ id: 'a', classes: [], html: '<h1>A</h1>', fitScale: 0.6 }] };
      A(!buildPrintHtml(fdeck, { pageBackground: '' }).includes('scale(0.6)'), 'arch: PDF non applica più transform da fitScale');
      A(!buildDeckHtml(fdeck).includes('scale(0.6)') && !buildDeckHtml(fdeck).includes('fitSlide'), 'arch: export HTML senza transform fit né auto-fit');

      // ---- [F1] canvas PER-DECK: l'export usa deck.canvas (qualsiasi 16:9), non 1280 fisso ----
      const bigDeck = { meta: { title: 'B', lang: 'it' }, mode: 'deck', canvas: { w: 1920, h: 1080 }, styleCss: '', slides: [{ id: 'a', classes: [], html: '<h1>A</h1>' }] };
      const bigHtml = buildDeckHtml(bigDeck);
      A(bigHtml.includes('1920px') && bigHtml.includes('1080px') && !bigHtml.includes('1280px'), 'F1: export HTML usa il canvas del deck (1920×1080)');
      A(bigHtml.includes('W=1920,H=1080'), 'F1: lo scaling della shell usa il canvas del deck');
      const bigPdf = buildPrintHtml(bigDeck, { pageBackground: '' });
      A(bigPdf.includes('1920px') && bigPdf.includes('1080px'), 'F1: PDF .ss-page = canvas del deck');
      A(bigPdf.includes('508.000mm') && bigPdf.includes('285.750mm'), 'F1: PDF @page = mm equivalenti (1920/96·25.4)');
      // deck 1280 default: invariato (comportamento neutro)
      A(buildDeckHtml(fdeck).includes('1280px') && buildPrintHtml(fdeck, { pageBackground: '' }).includes('338.667mm'), 'F1: deck 1280×720 invariato (default canonico)');

      // ---- [F2] canvas persistito nel meta + round-trip autorevole (no re-detection) ----
      // il meta è dentro il srcdoc → " escapizzato a &quot; nell'HTML esterno
      A(bigHtml.includes('slidewright:canvas') && bigHtml.includes('1920x1080'), 'F2: export persiste il canvas nel meta (dentro il srcdoc)');
      const reBig = parseDeck(bigHtml);
      A(reBig.canvas.w === 1920 && reBig.canvas.h === 1080 && reBig._canvasFromMeta === true, 'F2: re-import legge il canvas dal meta (autorevole, round-trip stabile)');
      // deck senza meta → default canonico + niente flag (sarà l'app a rilevare)
      const noMeta = parseDeck('<html><body><div class="deck"><section class="slide"><h1>A</h1></section></div></body></html>');
      A(noMeta.canvas.w === 1280 && !noMeta._canvasFromMeta, 'F2: deck senza meta → 1280×720 default, detection demandata all\'app');

      // ---- [F4] l'export include il fit overflow (scala-per-starci, coerente con l'editor) ----
      A(bigHtml.includes('function fit(') && /maxB>H\+2\|\|maxR>W\+2/.test(bigHtml), 'F4: export HTML include il fit overflow runtime');
      A(buildPrintHtml(fdeck).includes('ss-print-fr') && buildPrintHtml(fdeck).includes('querySelectorAll(\'.ss-deck > .slide\')'), 'F4: PDF = iframe-per-pagina col fit overflow della presentazione');

      // ---- id slide preservato (deck che stilano per #slide-N) ----
      const idDeck = parseDeck('<html><body><div class="deck"><section class="slide" id="slide-9"><h1>A</h1></section><section class="slide"><h1>B</h1></section></div></body></html>');
      A(idDeck.slides[0].elId === 'slide-9' && !idDeck.slides[1].elId, 'id: elId catturato da #slide-9 (vuoto se assente)');
      A(parseDeck(buildDeckHtml(idDeck)).slides[0].elId === 'slide-9', 'id: export HTML preserva l\'id (round-trip)');
      A(buildPrintHtml(idDeck).includes('slide-9'), 'id: export PDF preserva l\'id della slide (nel srcdoc della pagina)');

      // ---- export PDF rasterizzato (immagini → fedele su ogni device, niente trasparenze) ----
      const rp = buildRasterPrintHtml(fdeck, ['data:image/png;base64,AAA', 'data:image/png;base64,BBB']);
      A(/class="ss-raster"/.test(rp) && (rp.match(/ss-page/g) || []).length >= 2, 'raster: 1 pagina @page per immagine');
      A(/@page\s*\{\s*size:\s*338\.667mm 190\.500mm/.test(rp) && !/ss-print-fr/.test(rp) && !/iframe/.test(rp), 'raster: pagine 16:9 di sole immagini (no iframe/trasparenze)');
      A(typeof rasterizeDeck === 'function', 'raster: rasterizeDeck esportato (snapdom caricato dinamicamente a runtime)');

      // ---- libreria icone ----
      A(Object.keys(ICONS).length >= 12, `icone: raccolta ≥12 (${Object.keys(ICONS).length})`);
      A(/^<svg/.test(iconSvg('warning')) && /fill="currentColor"/.test(iconSvg('warning')), 'icone: iconSvg genera SVG ricolorabile (currentColor)');
      A(iconSvg('nope') === '', 'icone: chiave inesistente → stringa vuota');

      // ---- credito cucito negli export (neutro, sempre presente) ----
      A(/Slidewright/.test(buildDeckHtml(idDeck)) && /Slidewright/.test(buildPrintHtml(idDeck, { pageBackground: '' })), 'credito: HTML e PDF esportati contengono il credito Slidewright');
      A(!parseDeck('<html><body><div class="deck"><section class="slide" id="a b"><h1>X</h1></section></div></body></html>').slides[0].elId, 'id: id non valido (spazi) scartato');

      // ---- handler inline (on*) / javascript: ----
      A(!/onerror/i.test(deck.slides[0].html), 'sicurezza: attributo on* (onerror) rimosso in import');
      const cl2 = cleanSlideHtml('<a href="javascript:alert(1)" onclick="x()">y</a>');
      A(!/onclick/i.test(cl2) && !/javascript:/i.test(cl2), 'sicurezza: export rimuove on* e URL javascript:');

      // ---- assets pool ----
      A(deck.slides[0].html.includes('data-ss-asset') && !deck.slides[0].html.includes('base64'),
        'assets: import → placeholder leggero (no base64 nel modello)');
      const ex = externalize(`<img src="${PNG}">`);
      const id1 = (ex.match(/data-ss-asset="(a\d+)"/) || [])[1];
      A(!!id1 && !ex.includes('base64'), 'assets: externalize → placeholder');
      A(externalize(inline(ex)).includes(id1), 'assets: re-externalize riusa lo stesso id (no leak)');
      const fin = inline(ex, { forExport: true });
      A(fin.includes('base64') && !fin.includes('data-ss-asset'), 'assets: inline forExport ripristina base64');

      // ---- contesto LLM: niente base64 nel prompt ----
      const llm = describeAssetsForLlm(deck.slides[0].html);     // modello: placeholder
      A(!/data:|base64/i.test(llm) && /\(immagine/.test(llm), 'agente: describeAssetsForLlm → placeholder, niente base64');
      const llm2 = describeAssetsForLlm(`<img src="${PNG}">`);    // dataURL "crudo" residuo
      A(!/data:|base64/i.test(llm2), 'agente: anche un dataURL crudo viene tolto dal contesto LLM');

      // ---- gc pool asset (prune dei non referenziati) ----
      const tmpEx = externalize(`<img src="${PNG}">`);
      A(inline(tmpEx).includes('base64'), 'gc: asset presente nel pool prima del prune');
      pruneAssets(collectAssetIds(deck.slides.map((s) => s.html))); // tiene SOLO quelli del deck
      A(!inline(tmpEx).includes('base64'), 'gc: pruneAssets libera gli asset non referenziati');
      A(inline(deck.slides[0].html).includes('base64'), 'gc: gli asset referenziati restano nel pool');

      // ---- export ----
      const html = buildDeckHtml(deck);
      A(parseDeck(html).slides.length === 2, 'export: 2 sezioni (round-trip)');
      A(html.includes('<iframe class="ss-stage"') && html.includes('srcdoc='), 'export: deck dentro iframe-stage (srcdoc)');
      A(html.includes('base64'), 'export: immagini reinserite (base64)');
      A(!html.includes('data-ss-asset') && !html.includes('data-ss-eid'), 'export: nessun attributo interno');
      const clean = cleanSlideHtml('<div data-ss-eid="x" contenteditable="true" class="ss-selected card">c</div>');
      A(!clean.includes('data-ss-eid') && !clean.includes('contenteditable') && clean.includes('card'),
        'export: cleanSlideHtml strip attributi editor, mantiene .card');

      // ---- presentazione WYSIWYG: stage logico fisso scalato (no responsive 100vw/vh) ----
      A(html.includes('class="ss-stage"') && html.includes('.ss-stage{') && /width:1280px;height:720px/.test(html),
        'present: stage logico 1280x720 (no più 100vw/100vh)');
      A(html.includes('scale(') && html.includes("window.innerWidth/W"),
        'present: runtime scala lo stage al viewport (letterbox)');
      A(html.includes('<style data-ss-runtime>') && html.includes('<script data-ss-runtime>'),
        'present: CSS/JS di runtime marcati data-ss-runtime');
      // round-trip: il runtime NON deve rientrare nello styleCss del deck (contaminerebbe l'editor)
      const rt = parseDeck(html);
      A(!/ss-stage/.test(rt.styleCss) && !/transform-origin:center/.test(rt.styleCss),
        'present: round-trip esclude il runtime dallo styleCss');
      A(rt.slides.length === deck.slides.length, 'present: round-trip preserva le slide');
      // lint vh/vw: avviso su deck con unità relative al viewport
      const vhDeck = parseDeck('<html><head><style>.slide{height:100vh;font-size:5vw}</style></head><body><div class="deck"><section class="slide"><h1>A</h1></section></div></body></html>');
      A(vhDeck._warnings.some((w) => /vh\/vw/.test(w)), 'present: lint vh/vw emette warning');
      A(!parseDeck('<html><body><div class="deck"><section class="slide"><h1>A</h1></section></div></body></html>')._warnings.some((w) => /vh\/vw/.test(w)),
        'present: nessun warning vh/vw su deck in px');

      // ---- modalità documento (HTML non-slide) ----
      const docDeck = parseDeck('<!DOCTYPE html><html><head><title>Doc</title><style>body{color:red}</style></head><body><section><h1>Titolo</h1><p>testo</p></section><section><p>altro</p></section></body></html>');
      A(docDeck.mode === 'doc', `doc: <section> semantici non sono un deck → mode=${docDeck.mode}`);
      A(docDeck.slides.length === 1, `doc: una sola pagina (${docDeck.slides.length})`);
      const docHtml = buildDeckHtml(docDeck);
      A(!docHtml.includes('ss-deck') && docHtml.includes('<body>'), 'doc: export = documento HTML normale (no wrapper deck)');
      const realDeck = parseDeck('<html><body><div class="deck"><section class="slide"><h1>A</h1></section></div></body></html>');
      A(realDeck.mode === 'deck', 'doc: un vero deck (.slide) resta mode=deck');

      // ---- model ----
      const d = createDeck();
      A(d.slides.length >= 1 && d.canvas.w === 1280, 'model: createDeck valido');
      const c = cloneDeck(d); c.slides[0].html = 'X';
      A(d.slides[0].html !== 'X', 'model: cloneDeck indipendente (deep copy)');

      // ---- deck di benvenuto (slide iniziali = istruzioni) ----
      const wd = welcomeDeck();
      A(wd.slides.length === 2 && wd.mode === 'deck', `benvenuto: deck di 2 slide (${wd.slides.length})`);
      A(/Benvenuto in Slidewright/i.test(wd.slides[0].html), 'benvenuto IT: slide 1 = intro');
      A(/Tab|⌥-click|Doppio click/i.test(wd.slides[1].html), 'benvenuto IT: slide 2 = istruzioni gesti');
      A(wd.slides[0].id !== createDeck().slides[0].id, 'benvenuto: id slide univoci');
      A(wd.meta.lang === 'it', 'benvenuto IT: meta.lang it');
      const wde = welcomeDeck('en');
      A(/Welcome to Slidewright/i.test(wde.slides[0].html), 'benvenuto EN: slide 1 in inglese');
      A(/Tab|Double-click|⌥-click/i.test(wde.slides[1].html), 'benvenuto EN: slide 2 istruzioni EN');
      A(wde.meta.lang === 'en' && !/Benvenuto/i.test(wde.slides[0].html), 'benvenuto EN: lingua en, niente italiano');

      // ---- selezione attraverso elementi sovrapposti (issue 2) ----
      const scene = document.createElement('div');
      scene.style.cssText = 'position:absolute;left:-9999px;top:0;width:640px;height:360px';
      scene.innerHTML = '<div id="t-canvas"><iframe id="t-frame" style="width:100%;height:100%;border:0"></iframe><div id="t-overlay"></div></div>';
      document.body.appendChild(scene);
      const stage = new Stage({
        sceneEl: scene, canvasEl: scene.querySelector('#t-canvas'),
        frameEl: scene.querySelector('#t-frame'), overlayEl: scene.querySelector('#t-overlay'),
      });
      stage.render({ id: 's1', classes: [], html:
        '<div data-tag="back" style="position:absolute;left:100px;top:100px;width:300px;height:300px;background:#333"></div>' +
        '<div data-tag="front" style="position:absolute;left:200px;top:200px;width:300px;height:300px;background:#777"></div>'
      }, '', 'deck');
      await new Promise((r) => setTimeout(r, 60));
      stage.fitScale();

      const stack = stage._stackAt(250, 250); // dentro entrambi (overlap 200..400)
      A(stack.length === 2, `selezione: 2 elementi impilati al punto (${stack.length})`);
      A(stack[0]?.getAttribute('data-tag') === 'front', 'selezione: il primo è quello in cima (front)');
      A(stack[1]?.getAttribute('data-tag') === 'back', 'selezione: il secondo è quello sotto (back)');
      A(stage._stackAt(10, 10).length === 0, 'selezione: punto vuoto → nessun elemento (ss-slide escluso)');
      A(stack[0].style.pointerEvents === '' && stack[1].style.pointerEvents === '', 'selezione: pointer-events ripristinati dopo lo scan');

      const picked = [];
      stage.onSelect = (eid) => { picked.push(eid); stage.selectedEid = eid; };
      stage.pickAt(250, 250, false);
      A(stage.getElement(picked[0])?.getAttribute('data-tag') === 'front', 'pickAt: click → elemento in cima');
      stage.pickAt(250, 250, true);  // ⌥/⌘ → click through
      A(stage.getElement(picked[1])?.getAttribute('data-tag') === 'back', 'pickAt ⌥: click-through → elemento sotto');
      stage.pickAt(250, 250, true);  // cicla e torna in cima
      A(stage.getElement(picked[2])?.getAttribute('data-tag') === 'front', 'pickAt ⌥: il ciclo torna in cima (wrap)');

      A(stage.editableList().length === 2, `lista: 2 elementi selezionabili per Tab (${stage.editableList().length})`);
      A(stage.overlapCountFor(picked[0]) >= 1, 'overlap: conteggio sovrapposizioni > 0 sull\'elemento');
      A(stage.hasForeignOverlap(picked[0]) === true, 'overlap: front/back = sovrapposizione vera (non annidamento)');

      // tastiera instradata DALL'iframe (cliccando la slide il focus entra nell'iframe:
      // senza questo Canc/frecce/⌘Z non arrivavano all'App)
      let keyed = false; stage.onKey = () => { keyed = true; };
      stage.doc.dispatchEvent(new KeyboardEvent('keydown', { key: 'x', bubbles: true }));
      A(keyed, 'tastiera: keydown dentro l\'iframe instradato a onKey (Canc/frecce funzionano)');
      // editing: salta le immagini, entra sui testi/box
      const imgEl = stage.doc.createElement('img'); imgEl.setAttribute(EDITOR_ATTR, 'e-img');
      stage.slideEl.appendChild(imgEl);
      stage.beginEditingEid('e-img'); A(!stage.isEditing(), 'editing: beginEditingEid salta le immagini');
      stage.beginEditingEid(stack[0].getAttribute(EDITOR_ATTR));
      A(stage.isEditing(), 'editing: beginEditingEid entra su un box'); stage._endEditing();

      // spostare un box in flusso NON deve far riassestare gli altri (segnaposto)
      stage.render({ id: 's2', classes: [], html:
        '<div style="display:flex;gap:10px;position:absolute;left:100px;top:100px">' +
        '<div data-tag="x" style="width:120px;height:60px;background:#444"></div>' +
        '<div data-tag="y" style="width:120px;height:60px;background:#888"></div></div>'
      }, '', 'deck');
      await new Promise((r) => setTimeout(r, 30));
      const yLeft = () => stage.slideEl.querySelector('[data-tag="y"]').getBoundingClientRect().left;
      const y0 = yLeft();
      stage.makeFree(stage.slideEl.querySelector('[data-tag="x"]'));
      A(Math.abs(yLeft() - y0) < 1, `flusso: spostando X l'altro box Y resta fermo (${y0}→${yLeft()})`);
      A(!!stage.doc.querySelector('[data-ss-spacer]'), 'flusso: segnaposto inserito al posto di X');
      A(stage.doc.defaultView.getComputedStyle(stage.slideEl.querySelector('[data-tag="x"]')).position === 'absolute', 'flusso: X reso libero');
      A(stage.editableList().every((id) => !stage.getElement(id).hasAttribute('data-ss-spacer')), 'flusso: il segnaposto non è selezionabile');

      // drop di un file SOPRA la slide: preventDefault (il browser non apre il file) + inoltro
      let dropped = 'no'; stage.onDrop = () => { dropped = 'yes'; };
      const dev = new DragEvent('drop', { bubbles: true, cancelable: true });
      stage.doc.dispatchEvent(dev);
      A(dev.defaultPrevented, 'drop iframe: preventDefault (il browser non apre il file)');
      A(dropped === 'yes', 'drop iframe: dataTransfer inoltrato a onDrop');

      // rotazione: rectOf legge l'angolo dall'inline transform
      const xEl = stage.slideEl.querySelector('[data-tag="x"]');
      A(stage.rectOf(xEl.getAttribute(EDITOR_ATTR)).angle === 0, 'rotazione: angolo 0 di default');
      xEl.style.transform = 'rotate(30deg)';
      A(Math.abs(stage.rectOf(xEl.getAttribute(EDITOR_ATTR)).angle - 30) <= 1, 'rotazione: rectOf legge 30°');

      // ---- [ARCH] tela fissa: niente contentScale, niente adattamento del contenuto ----
      A(stage.contentScale === undefined && stage.effScale === undefined, 'arch: contentScale/effScale rimossi dallo Stage');
      // [F4] contenuto più alto del canvas → la slide viene SCALATA per starci (fedele) +
      // selezione sospesa (viewLocked). La root resta 1280×720 di layout; il fit è via transform.
      stage.render({ id: 'tall', classes: [], html: '<div style="height:1400px;background:#333"></div>' }, '', 'deck');
      await new Promise((r) => setTimeout(r, 40));
      const tallRoot = stage.slideEl;
      A(Math.abs(tallRoot.offsetHeight - 720) <= 1 && Math.abs(tallRoot.offsetWidth - 1280) <= 1, 'F4: root resta 1280×720 di layout');
      A(stage._overflowScale > 0.42 && stage._overflowScale < 0.6, `F4: overflow → scala ~0.51 per starci (${stage._overflowScale})`);
      A(/matrix|scale/.test(stage.doc.defaultView.getComputedStyle(tallRoot).transform), 'F4: transform scale applicato alla root overflow');
      A(stage.viewLocked === true, 'F4: viewLocked sulle slide scalate (selezione sospesa)');
      // D4: il deck impone .slide{width:960!important} → NON vince, la tela resta 1280×720
      stage.render({ id: 'own', classes: [], html: '<h1>X</h1>' }, '.slide{width:960px!important;height:540px!important}', 'deck');
      await new Promise((r) => setTimeout(r, 30));
      A(Math.abs(stage.slideEl.offsetWidth - 1280) <= 1 && Math.abs(stage.slideEl.offsetHeight - 720) <= 1, 'arch[D4]: .slide{width:960!important} del deck NON cambia la tela 1280×720');
      // rectOf = geometria reale (offset*), senza compensazione di scala
      stage.render({ id: 'r', classes: [], html: '<div data-tag="b" style="position:absolute;left:100px;top:60px;width:300px;height:150px;background:#555"></div>' }, '', 'deck');
      await new Promise((r) => setTimeout(r, 20));
      const bEl = stage.slideEl.querySelector('[data-tag="b"]'); const beid = bEl.getAttribute(EDITOR_ATTR);
      const ro = stage.rectOf(beid);
      A(Math.abs(ro.w - 300) <= 1 && Math.abs(ro.h - 150) <= 1 && Math.abs(ro.x - 100) <= 1 && Math.abs(ro.y - 60) <= 1, 'arch: rectOf = geometria reale (offset*, no contentScale)');
      // id originale preservato sulla root (CSS #slide-N del deck)
      stage.render({ id: 'x', elId: 'slide-9', classes: [], html: '<h1>A</h1>' }, '', 'deck');
      await new Promise((r) => setTimeout(r, 20));
      A(stage.slideEl.id === 'slide-9' && stage.slideEl.classList.contains('ss-root'), 'id: root ha id originale + classe ss-root');
      scene.remove();

      // ---- inspector: il riempimento VINCE su CSS !important e gradienti del deck ----
      // (regressione deck reale: 102/601 elementi avevano fill ignorato — 27 per regole
      //  !important, 75 per gradienti che coprivano il colore)
      const finsp = new Inspector(document.createElement('div'), document.createElement('div'));
      const fillEl = document.createElement('div');
      fillEl.id = 'ssfilltest';
      fillEl.style.cssText = 'background:linear-gradient(90deg,#003865,#001f3d)';
      document.body.appendChild(fillEl);
      const fsheet = document.createElement('style');
      fsheet.textContent = '#ssfilltest{background:#003865 !important}'; // batte un inline normale
      document.head.appendChild(fsheet);
      finsp.getElement = () => fillEl; finsp.commit = () => {}; finsp.liveRefresh = () => {};
      finsp.render('x');
      const fillSw = [...finsp.bodyEl.querySelectorAll('.insp__row')]
        .find((r) => r.querySelector('.insp__label')?.textContent.trim() === 'Sfondo')
        ?.querySelector('input[type=color]');
      fillSw.value = '#00ff00'; fillSw.dispatchEvent(new Event('change'));
      A(fillEl.style.getPropertyPriority('background-color') === 'important', 'fill: applica background-color con !important');
      A(fillEl.style.getPropertyValue('background-image') === 'none' && fillEl.style.getPropertyPriority('background-image') === 'important', 'fill: azzera il gradiente (background-image:none !important)');
      A(getComputedStyle(fillEl).backgroundColor === 'rgb(0, 255, 0)', 'fill: computed = verde (vince su #003865 !important del deck)');
      A(getComputedStyle(fillEl).backgroundImage === 'none', 'fill: nessun gradiente residuo che copra il colore');
      fillEl.remove(); fsheet.remove();

      // ---- inspector: colore con alpha (no schiacciamento dell'opacità) ----
      A(hexToRgba('#b45309', 0.2) === 'rgba(180, 83, 9, 0.2)', 'colore: hex+alpha → rgba');
      const pa = rgbaParts('rgba(180, 83, 9, 0.18)');
      A(pa.hex.toLowerCase() === '#b45309' && Math.abs(pa.a - 0.18) < 1e-6, 'colore: parse rgba → hex+alpha');
      A(rgbaParts('rgb(16, 32, 48)').a === 1, 'colore: rgb senza alpha → a=1');

      // ---- inspector _color: trasparente parte da colore VISIBILE + opacità lo applica ----
      const insp = new Inspector(document.createElement('div'), document.createElement('div'));
      const capA = [];
      const cw = insp._color('rgba(0,0,0,0)', (v) => capA.push(v), { allowTransparent: true, fallbackHex: '#ff0000' });
      const swA = cw.querySelector('.insp__swatch');
      A(swA.value === '#ff0000', 'color: swatch su trasparente parte dal fallback visibile (no nero)');
      const rngA = cw.querySelector('.insp__alpha');
      rngA.value = '50'; rngA.dispatchEvent(new Event('input'));
      A(capA[capA.length - 1] === 'rgba(255, 0, 0, 0.5)', `color: opacità su trasparente applica il colore visibile (${capA[capA.length-1]})`);

      // ---- inspector _color: scegliere un colore su fill QUASI-trasparente lo rende OPACO ----
      // (regressione: card/forme del deck nascono con alpha 0.06–0.18 → il cambio colore
      //  dallo swatch era impercettibile; ora lo swatch porta a opaco, slider per la translucenza)
      const capLow = [];
      const lw = insp._color('rgba(180,83,9,0.18)', (v) => capLow.push(v), { allowTransparent: true });
      const swLow = lw.querySelector('.insp__swatch');
      swLow.value = '#00ff00'; swLow.dispatchEvent(new Event('change'));
      A(capLow[capLow.length - 1] === '#00ff00', `color: swatch su fill quasi-trasparente → opaco (${capLow[capLow.length-1]})`);
      A(lw.querySelector('.insp__alpha').value === '100', 'color: lo slider alpha si allinea a 100 dopo lo swatch');

      // ---- inspector _color: copia/incolla colore CON trasparenza ----
      const capDst = [];
      const src = insp._color('rgba(0,128,255,0.4)', () => {}, { allowTransparent: true });
      const dst = insp._color('#000000', (v) => capDst.push(v), { allowTransparent: true });
      const srcCopy = src.querySelectorAll('.insp__cbtn')[0]; // ⧉ copia
      const dstPaste = dst.querySelectorAll('.insp__cbtn')[1]; // ⤓ incolla
      srcCopy.click();
      dstPaste.click();
      A(capDst[capDst.length - 1] === 'rgba(0, 128, 255, 0.4)', `color: incolla preserva la trasparenza (${capDst[capDst.length-1]})`);
      A(dst.querySelector('.insp__swatch').value === '#0080ff', 'color: incolla aggiorna lo swatch');

      // ---- inspector _color: pipetta legge il colore (con alpha) dallo STILE elemento ----
      const tgt = document.createElement('div');
      tgt.style.backgroundColor = 'rgba(10, 20, 30, 0.5)';
      document.body.appendChild(tgt);
      const capPick = [];
      insp.eyedrop = (cb) => cb(tgt); // simula il click-pipetta sull'elemento
      const pc = insp._color('rgba(0,0,0,0)', (v) => capPick.push(v), { allowTransparent: true, pickProp: 'backgroundColor' });
      const dropBtn = pc.querySelectorAll('.insp__cbtn')[2]; // [copia, incolla, pipetta]
      dropBtn.click();
      A(capPick[capPick.length - 1] === 'rgba(10, 20, 30, 0.5)', `color: pipetta preleva il colore+alpha dallo stile (${capPick[capPick.length-1]})`);
      A(pc.querySelector('.insp__swatch').value === '#0a141e', 'color: pipetta aggiorna lo swatch');
      tgt.remove();

      // ---- inspector _color: scorciatoie bianco/nero ----
      const capBW = [];
      const bw = insp._color('rgb(120,120,120)', (v) => capBW.push(v), { pickProp: 'color', quickBW: true });
      const bwBtns = bw.querySelectorAll('.insp__bw');
      A(bwBtns.length === 2, `color: quickBW rende 2 pulsanti (${bwBtns.length})`);
      bwBtns[0].click(); A(capBW[capBW.length - 1] === '#000000', `color: pulsante Nero → #000000 (${capBW[capBW.length-1]})`);
      bwBtns[1].click(); A(capBW[capBW.length - 1] === '#ffffff', `color: pulsante Bianco → #ffffff (${capBW[capBW.length-1]})`);
      A(insp._color('rgb(0,0,0)', () => {}, { pickProp: 'color' }).querySelectorAll('.insp__bw').length === 0, 'color: niente quickBW senza opzione');

      // ---- iframe sandbox: handler inline NON eseguito (difesa in profondità) ----
      const sbx = document.createElement('iframe');
      sbx.setAttribute('sandbox', 'allow-same-origin'); // come lo stage: DOM accessibile, script OFF
      sbx.style.cssText = 'position:fixed;left:-9999px;width:10px;height:10px';
      document.body.appendChild(sbx);
      const sd = sbx.contentDocument;
      sd.open();
      sd.write('<!DOCTYPE html><img src="x" onerror="window.__SBX_PWNED=1">');
      sd.close();
      await new Promise((r) => setTimeout(r, 150));
      A(!window.__SBX_PWNED, 'sicurezza: iframe sandbox blocca onerror (no allow-scripts)');
      sbx.remove();

      // ---- copia/incolla: snapshot aspetto preserva il formato sotto re-parent (CSS per-ID) ----
      {
        const host = document.createElement('div');
        host.style.cssText = 'position:fixed;left:-9999px';
        host.innerHTML = '<style>#sl-x .c{color:rgb(10,200,120);font-weight:700}' +
          '#sl-x .c h3{color:rgb(240,170,60)}</style>' +
          '<section id="sl-x"><div class="c" id="o"><h3>T</h3></div></section>' +
          '<section id="dest"></section>';
        document.body.appendChild(host);
        const src = host.querySelector('#o');
        // senza fix: clone semplice spostato sotto #dest perde il colore per-ID
        const naive = src.cloneNode(true); host.querySelector('#dest').appendChild(naive);
        A(getComputedStyle(naive).color !== 'rgb(10, 200, 120)', `copia: re-parent senza snapshot perde il colore per-ID (${getComputedStyle(naive).color})`);
        naive.remove();
        // con fix: snapshotAppearance inlina l'aspetto → fedele anche sotto #dest
        const snap = snapshotAppearance(src, window);
        snap.id = ''; host.querySelector('#dest').appendChild(snap);
        A(getComputedStyle(snap).color === 'rgb(10, 200, 120)', `copia: snapshot preserva il colore del box (${getComputedStyle(snap).color})`);
        A(getComputedStyle(snap.querySelector('h3')).color === 'rgb(240, 170, 60)', 'copia: snapshot preserva il colore dei discendenti');
        A(!/color:\s*rgb\(0, 0, 0\)/.test(snap.getAttribute('style') || ''), 'copia: snapshot non inlina rumore nero di default');

        // ---- copia formato: readAppearance + applicazione a un target ----
        const fmap = readAppearance(src, window);
        A(fmap['color'] === 'rgb(10, 200, 120)', `formato: readAppearance legge il colore (${fmap['color']})`);
        A(fmap['font-weight'] === '700', 'formato: readAppearance legge il peso');
        A(!('background-color' in fmap), 'formato: readAppearance scarta lo sfondo trasparente (rumore)');
        const dst2 = document.createElement('p'); dst2.textContent = 'x';
        host.querySelector('#dest').appendChild(dst2);
        for (const [p, v] of Object.entries(fmap)) dst2.style.setProperty(p, v);
        A(getComputedStyle(dst2).color === 'rgb(10, 200, 120)', `formato: applicato al target preserva il colore (${getComputedStyle(dst2).color})`);
        host.remove();

        // ---- isNoise: bg-image url() esterno scartato, gradient/data: tenuti, font-weight 400 scartato ----
        const probe = document.createElement('div');
        probe.style.cssText = 'position:fixed;left:-9999px';
        document.body.appendChild(probe);
        probe.style.backgroundImage = 'url(http://example.com/x.png)';
        A(!('background-image' in readAppearance(probe, window)), 'noise: background-image url() esterno scartato (no file:// pollution)');
        probe.style.backgroundImage = 'linear-gradient(rgb(1,2,3), rgb(4,5,6))';
        A('background-image' in readAppearance(probe, window), 'noise: gradient mantenuto');
        probe.style.fontWeight = '400';
        A(!('font-weight' in readAppearance(probe, window)), 'noise: font-weight 400 scartato');
        probe.style.fontWeight = '700';
        A(readAppearance(probe, window)['font-weight'] === '700', 'noise: font-weight 700 mantenuto');
        // snapshot non duplica una proprietà già inline (CSSOM dedupa)
        const dupEl = document.createElement('div'); dupEl.style.color = 'rgb(9,9,9)';
        probe.appendChild(dupEl);
        const dupSnap = snapshotAppearance(dupEl, window);
        A((dupSnap.getAttribute('style').match(/(?:^|;)\s*color:/g) || []).length === 1, 'snapshot: nessuna proprietà color duplicata');
        probe.remove();
      }
    } catch (e) {
      fail++; log.push(`<span class="bad">EXCEPTION</span> ${e.message}\n${e.stack}`);
    }

    document.getElementById('result').innerHTML =
      `RISULTATO: ${pass} pass, ${fail} fail\n\n` + log.join('\n');
    document.title = fail === 0 ? `TESTS OK ${pass}/${pass}` : `TESTS FAIL ${fail}`;
  </script>
</body>
